<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            background-color: #f5f1e6;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        img {
            width: 180px;
            margin-bottom: 5px; /* logo खाली space कमी */
        }

        h3 {
            margin-top: 0px;   /* वरचा gap काढला */
            margin-bottom: 15px;
            color: #5a3e2b;
        }

        form {
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            width: 250px;
            margin: auto;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
       }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
            border: 1px solid #d2b48c;
            border-radius: 5px;
        }

       button {
    background: linear-gradient(135deg, #d2b48c, #5a3e2b);
    color: white;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, #5a3e2b, #3e2a1f);
}

button:active {
    transform: scale(0.97);
}
        a {
            color: #5a3e2b;
            text-decoration: none;
        }

        p {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png">

    <h3>Enter your login credentials</h3>

    <form>
        <label>Username:</label><br>
        <input type="text" placeholder="Enter your Username"><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Enter your Password"><br><br>

        <button>Login</button>
    </form>

    <p>Not registered? <a href="register.html">Create an account</a></p>

</div>

</body>
</html>
